; ntripcaster.conf — Registro de auth, fase 1 (NTRIP v1 unicamente)
;
; Formato INI, parseado con inih (vendor/inih, ya en el build).
;
; [source]
;   mountpoint = password
;   Usado por el comando "SOURCE <password> <mountpoint>" (v1). No lleva
;   usuario -- asi es como lo manda el protocolo v1.
;
; [client:mountpoint]   <- OJO: una seccion POR mountpoint, no una clave
;                           "mountpoint:usuario". inih trata ':' igual
;                           que '=' como separador dentro de una linea
;                           name=value, asi que iba a romper el parseo
;                           si lo poniamos en la clave. En el nombre de
;                           la SECCION es seguro (solo corta en ']').
;   usuario = password
;   Usado por GET /mountpoint con header "Authorization: Basic ..."
;   (aplica tanto a clientes v1 como v2, comparten el mismo handler).
;
; auth_check_source()/auth_check_client() en src/protocol/auth.c fallan
; cerrado: si el mountpoint/usuario no esta acá, se rechaza. Si agregas
; un mountpoint nuevo, agregalo tambien acá o el source no va a poder
; registrarse.
;
; IMPORTANTE: "sourcepass123" de abajo es un placeholder. Si tu relay
; real (SNIP u otro) ya manda un password distinto para /Demo1, o
; cambialo acá para que coincida, o reconfigura el relay para que use
; este. Mientras no coincidan, el SOURCE va a ser rechazado con
; "ERROR - Bad Password".
;
; POST v2 (source) tambien valida contra [source] (auth cableada).
;
; Reload en caliente: editar este archivo y ejecutar
;     kill -HUP $(pidof ntripcaster)
; -- toma los cambios SIN reiniciar y sin cortar a los conectados.
;
; OJO fail-closed: el mountpoint que uses en tu GNSS debe existir ACA,
; con exactamente el mismo nombre (case-sensitive, sin la barra).

[source]
BASE1 = passbase123

[client:BASE1]
rover1 = passrover1
rover2 = passrover2
